<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="../css/formularios.css" rel="stylesheet">
    
</head>

	<body background="../imagenes/banner.JPG">
		<form action="">
            <h1>Iniciar Sesión</h1>
            
            <fieldset>
                <legend>Ingresa tus datos</legend>
                
                <label for="">Correo</label>
                <br><br>
                <input class="caja"  type="email" placeholder="usuario@hotmail.com" required>
                <br><br>

                <label for="">Contraseña</label>
                <br><br>
                <input class="caja" type="password" size="40" maxlength="8" required>
                <br><br>

                <center>
                    <input id="aceptar" type="submit" value="Iniciar sesión">
                    <input id="cancelar" type="reset" value="Cancelar">
                    <p>Si no tienes una cuenta puedes <a href="../paginas/Registrarse.html">registrarte</a></p>  
                </center>
            </fieldset>
        </form>
	</body>
    <script src="../js/formulario.js"></script>
</html>
